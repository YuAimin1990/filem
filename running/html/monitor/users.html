<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 文件管理器</title>
    <script src="/static/alpine.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; color: #333; }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:hover { background: #7f8c8d; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 { font-size: 18px; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .role-admin { background: #667eea; color: white; }
        .role-user { background: #95a5a6; color: white; }
        .actions { display: flex; gap: 8px; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        .modal h3 { margin-bottom: 20px; font-size: 18px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions .btn { flex: 1; }
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>用户管理</h1>
        <div class="header-right">
            <span x-text="currentUser"></span>
            <button class="btn btn-secondary" @click="logout">退出登录</button>
        </div>
    </div>

    <div class="container" x-data="userManagement()">
        <!-- Permission Error -->
        <div x-show="permError" style="background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px;">
            <p x-text="permError" style="font-size: 16px; margin-bottom: 15px;"></p>
            <button class="btn btn-secondary" @click="window.location.href='/monitor/files.html'">返回文件管理器</button>
        </div>

        <div class="card" x-show="!permError">
            <div class="card-header">
                <h2>用户列表</h2>
                <button class="btn btn-primary" @click="showCreateModal = true">创建用户</button>
            </div>

            <div x-show="loading" class="loading">加载中...</div>
            <div x-show="!loading">
                <table>
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="user in users" :key="user.id">
                            <tr>
                                <td x-text="user.username"></td>
                                <td>
                                    <span class="role-badge" :class="user.role === 'admin' ? 'role-admin' : 'role-user'"
                                          x-text="user.role === 'admin' ? '管理员' : '普通用户'"></span>
                                </td>
                                <td x-text="formatDate(user.created_at)"></td>
                                <td class="actions">
                                    <button class="btn btn-secondary" @click="editUser(user)">编辑</button>
                                    <button class="btn btn-danger" @click="confirmDelete(user)" x-show="user.username !== currentUser">删除</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Create/Edit Modal -->
        <div class="modal-overlay" x-show="showCreateModal || showEditModal" x-transition>
            <div class="modal" @click.stop>
                <h3 x-text="showCreateModal ? '创建用户' : '编辑用户'"></h3>
                <div class="error-message" x-show="error" x-text="error"></div>
                <form @submit.prevent="submitForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" x-model="form.username" :disabled="showEditModal" required>
                    </div>
                    <div class="form-group">
                        <label x-text="showCreateModal ? '密码' : '新密码 (留空则不修改)'"></label>
                        <input type="password" x-model="form.password" :required="showCreateModal">
                    </div>
                    <div class="form-group">
                        <label x-text="showCreateModal ? '确认密码' : '确认新密码'"></label>
                        <input type="password" x-model="form.confirmPassword" :required="showCreateModal || form.password">
                    </div>
                    <div class="form-group" x-show="showEditModal && isAdmin && form.username !== currentUser">
                        <label>角色</label>
                        <select x-model="form.role">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" @click="closeModal">取消</button>
                        <button type="submit" class="btn btn-primary" :disabled="submitting">
                            <span x-show="!submitting" x-text="showCreateModal ? '创建' : '保存'"></span>
                            <span x-show="submitting">处理中...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div class="modal-overlay" x-show="showDeleteModal" x-transition>
            <div class="modal" @click.stop>
                <h3>确认删除</h3>
                <p style="margin-bottom: 20px; color: #666;">
                    确定要删除用户 "<span x-text="deleteTarget.username"></span>" 吗？此操作不可撤销。
                </p>
                <div class="modal-actions">
                    <button class="btn btn-secondary" @click="showDeleteModal = false">取消</button>
                    <button class="btn btn-danger" @click="executeDelete" :disabled="submitting">
                        <span x-show="!submitting">删除</span>
                        <span x-show="submitting">删除中...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function userManagement() {
            return {
                users: [],
                loading: true,
                error: '',
                permError: '',
                currentUser: '',
                isAdmin: false,
                showCreateModal: false,
                showEditModal: false,
                showDeleteModal: false,
                submitting: false,
                deleteTarget: null,
                form: {
                    id: '',
                    username: '',
                    password: '',
                    confirmPassword: '',
                    role: 'user'
                },

                async init() {
                    const authorized = await this.checkAuth();
                    if (authorized) {
                        await this.loadUsers();
                    }
                },

                async checkAuth() {
                    const token = localStorage.getItem('session_token');
                    const currentPath = window.location.pathname;
                    if (!token) {
                        window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                        return false;
                    }

                    try {
                        const response = await fetch('/api/auth/session', {
                            headers: { 'X-Session-Token': token }
                        });
                        const data = await response.json();

                        if (data.code !== 0) {
                            localStorage.removeItem('session_token');
                            localStorage.removeItem('user');
                            window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                            return false;
                        }

                        this.currentUser = data.data.username;
                        this.isAdmin = data.data.role === 'admin';

                        if (!this.isAdmin) {
                            this.permError = '没有相应权限，无法打开' + currentPath;
                            return false;
                        }
                        return true;
                    } catch (e) {
                        window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                        return false;
                    }
                },

                async loadUsers() {
                    this.loading = true;
                    try {
                        const token = localStorage.getItem('session_token');
                        const response = await fetch('/api/users', {
                            headers: { 'X-Session-Token': token }
                        });
                        const data = await response.json();

                        if (data.code === 0) {
                            this.users = data.data.users || [];
                        } else {
                            this.error = data.message || '加载用户失败';
                        }
                    } catch (e) {
                        this.error = '网络错误';
                    } finally {
                        this.loading = false;
                    }
                },

                editUser(user) {
                    this.form = { id: user.id, username: user.username, password: '', confirmPassword: '', role: user.role };
                    this.showEditModal = true;
                    this.error = '';
                },

                confirmDelete(user) {
                    this.deleteTarget = user;
                    this.showDeleteModal = true;
                },

                async executeDelete() {
                    if (!this.deleteTarget) return;
                    this.submitting = true;

                    try {
                        const token = localStorage.getItem('session_token');
                        const response = await fetch('/api/users?action=delete&id=' + this.deleteTarget.id, {
                            method: 'DELETE',
                            headers: { 'X-Session-Token': token }
                        });
                        const data = await response.json();

                        if (data.code === 0) {
                            this.showDeleteModal = false;
                            this.deleteTarget = null;
                            await this.loadUsers();
                        } else {
                            this.error = data.message || '删除失败';
                        }
                    } catch (e) {
                        this.error = '网络错误';
                    } finally {
                        this.submitting = false;
                    }
                },

                async submitForm() {
                    // 密码确认校验
                    if (this.form.password && this.form.password !== this.form.confirmPassword) {
                        this.error = '两次输入的密码不一致';
                        return;
                    }
                    this.submitting = true;
                    this.error = '';

                    try {
                        const token = localStorage.getItem('session_token');
                        let response, data;

                        if (this.showCreateModal) {
                            response = await fetch('/api/users', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-Session-Token': token
                                },
                                body: JSON.stringify({
                                    username: this.form.username,
                                    password: this.form.password,
                                    role: this.form.role
                                })
                            });
                        } else {
                            const updates = {};
                            if (this.form.password) updates.password = this.form.password;
                            if (this.form.role) updates.role = this.form.role;

                            response = await fetch('/api/users?action=update&id=' + this.form.id, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-Session-Token': token
                                },
                                body: JSON.stringify(updates)
                            });
                        }

                        data = await response.json();

                        if (data.code === 0) {
                            this.closeModal();
                            await this.loadUsers();
                        } else {
                            this.error = data.message || '操作失败';
                        }
                    } catch (e) {
                        this.error = '网络错误';
                    } finally {
                        this.submitting = false;
                    }
                },

                closeModal() {
                    this.showCreateModal = false;
                    this.showEditModal = false;
                    this.form = { id: '', username: '', password: '', confirmPassword: '', role: 'user' };
                    this.error = '';
                },

                formatDate(timestamp) {
                    if (!timestamp) return '-';
                    return new Date(timestamp * 1000).toLocaleString('zh-CN');
                },

                async logout() {
                    try {
                        const token = localStorage.getItem('session_token');
                        await fetch('/api/auth/logout?action=logout', {
                            method: 'POST',
                            headers: { 'X-Session-Token': token }
                        });
                    } finally {
                        localStorage.removeItem('session_token');
                        localStorage.removeItem('user');
                        window.location.href = '/monitor/login.html';
                    }
                }
            }
        }
    </script>
</body>
</html>
