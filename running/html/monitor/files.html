    <!-- ===== 新建目录对话框 ===== -->
    <div x-show="showMkdirDialog" class="dialog-overlay" @click.self="showMkdirDialog = false">
        <div class="dialog-box">
            <h3 class="dialog-title">
                <svg class="icon icon-lg text-blue-500" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/>
                </svg>
                新建目录
            </h3>
            <input type="text" 
                   x-model="newDirName" 
                   x-ref="mkdirInput"
                   placeholder="请输入目录名称" 
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   @keydown="handleMkdirKeydown($event)">
            <div class="dialog-actions">
                <button @click="showMkdirDialog = false" class="dialog-btn dialog-btn-secondary">取消</button>
                <button @click="createDirectory()" 
                        class="dialog-btn dialog-btn-primary"
                        :disabled="!newDirName.trim()"
                        :class="{ 'opacity-50 cursor-not-allowed': !newDirName.trim() }">
                    创建
                </button>
            </div>
        </div>
    </div>

    <!-- ===== 新建文件对话框 ===== -->
    <div x-show="showNewFileDialog" class="dialog-overlay" @click.self="showNewFileDialog = false">
        <div class="dialog-box">
            <h3 class="dialog-title">
                <svg class="icon icon-lg text-indigo-500" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/>
                </svg>
                新建文件
            </h3>
            <input type="text"
                   x-model="newFileName"
                   x-ref="newFileInput"
                   @keydown="if(event.key==='Enter')createNewFile();else if(event.key==='Escape')showNewFileDialog=false;"
                   x-effect="if(showNewFileDialog){newFileName='';$nextTick(()=>$refs.newFileInput?.focus())}"
                   placeholder="请输入文件名（如 note.txt、readme.md）"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   @keydown="if(event.key==='Enter')createNewFile();else if(event.key==='Escape')showNewFileDialog=false;">
            <div class="dialog-actions">
                <button @click="showNewFileDialog = false" class="dialog-btn dialog-btn-secondary">取消</button>
                <button @click="createNewFile()"
                        class="dialog-btn dialog-btn-primary"
                        :disabled="!newFileName.trim()"
                        :class="{ 'opacity-50 cursor-not-allowed': !newFileName.trim() }">
                    创建并编辑
                </button>
            </div>
        </div>
    </div>

    <!-- ===== 重命名对话框 ===== -->
    <div x-show="showRenameDialog" class="dialog-overlay" @click.self="showRenameDialog = false">
        <div class="dialog-box">
            <h3 class="dialog-title">
                <svg class="icon icon-lg text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                重命名
            </h3>
            <input type="text" 
                   x-model="renameTarget.newName" 
                   x-ref="renameInput"
                   placeholder="请输入新名称" 
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   @keydown="handleRenameKeydown($event)">
            <div class="dialog-actions">
                <button @click="showRenameDialog = false" class="dialog-btn dialog-btn-secondary">取消</button>
                <button @click="renameFile()" 
                        class="dialog-btn dialog-btn-primary"
                        :disabled="!renameTarget.newName.trim()"
                        :class="{ 'opacity-50 cursor-not-allowed': !renameTarget.newName.trim() }">
                    重命名
                </button>
            </div>
        </div>
    </div>

    <!-- ===== 删除确认对话框 ===== -->
    <div x-show="showDeleteConfirm" class="dialog-overlay" @click.self="showDeleteConfirm = false">
        <div class="dialog-box">
            <h3 class="dialog-title text-red-600">
                <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                确认删除
            </h3>
            <div class="dialog-content">
                <p x-text="getDeleteMessage()"></p>
                <p class="text-red-500 text-sm mt-2">⚠️ 此操作无法撤销</p>
            </div>
            <div class="dialog-actions">
                <button @click="showDeleteConfirm = false" class="dialog-btn dialog-btn-secondary">取消</button>
                <button @click="executeDelete()" class="dialog-btn dialog-btn-danger">确认删除</button>
            </div>
        </div>
    </div>

    <!-- ===== 文件预览对话框 ===== -->
    <div x-show="preview.show" class="dialog-overlay" @click.self="closePreview()">
        <div class="bg-white rounded-xl w-full h-full flex flex-col" style="max-width: 100vw; max-height: 100vh; border-radius: 0;">
            <div class="flex items-center justify-between p-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold flex items-center gap-2">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    <span x-text="preview.file?.name"></span>
                </h3>
                <div class="flex items-center gap-3">
                    <button @click="downloadFile(preview.file)" class="text-gray-600 hover:text-blue-600 p-1" title="下载">
                        <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <path d="M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                    </button>
                    <button @click="closePreview()" class="text-gray-400 hover:text-gray-600 p-1">
                        <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 图片预览 -->
            <div x-show="preview.mediaType === 'image'" class="flex-1 overflow-auto p-4 bg-gray-800 flex items-center justify-center">
                <img :src="preview.url" class="max-w-full max-h-full object-contain">
            </div>

            <!-- 音频预览 -->
            <div x-show="preview.mediaType === 'audio'" class="flex-1 overflow-auto p-4 bg-gray-800 flex items-center justify-center">
                <audio controls class="w-full max-w-md" :src="preview.url"></audio>
            </div>

            <!-- 视频预览 -->
            <div x-show="preview.mediaType === 'video'" class="flex-1 overflow-auto p-4 bg-gray-800 flex items-center justify-center">
                <video controls class="max-w-full max-h-full" :src="preview.url"></video>
            </div>

            <!-- Markdown 预览 -->
            <div x-show="preview.mediaType === 'markdown'" class="flex-1 overflow-auto p-6 bg-white">
                <div x-html="preview.renderedContent" class="markdown-body prose max-w-none"></div>
            </div>

            <!-- 文本预览 -->
            <div x-show="!preview.mediaType" class="flex-1 overflow-auto p-4 bg-gray-900">
                <pre class="code-preview text-gray-300" x-show="!preview.loading"><code x-text="preview.content"></code></pre>
            </div>
            
            <!-- 底部信息栏 -->
            <div class="p-4 border-t border-gray-200 text-sm text-gray-500 flex justify-between">
                <span x-text="preview.file?.size_formatted"></span>
                <span x-text="formatDate(preview.file?.mtime)"></span>
                <span x-show="!preview.mediaType && preview.truncated" class="text-yellow-600">(已截断)</span>
            </div>
        </div>
    </div>

    <!-- ===== 文本编辑器对话框 ===== -->
    <div x-show="editor.show" class="dialog-overlay" style="z-index: 200;" @click.self="closeEditor()">
        <div class="bg-white rounded-xl w-full h-full flex flex-col" style="max-width: 100vw; max-height: 100vh; border-radius: 0;">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 bg-gray-50 rounded-t-xl">
                <div class="flex items-center gap-3">
                    <svg class="icon text-blue-500 icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    <div>
                        <h3 class="text-lg font-semibold" x-text="editor.file?.name"></h3>
                        <p class="text-xs text-gray-500" x-show="editor.isModified">已修改</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500" x-text="getLanguageLabel(editor.language)"></span>
                    <!-- Markdown 预览切换按钮 -->
                    <button x-show="editor.language === 'markdown'" @click="editor.showPreview = !editor.showPreview"
                            class="px-3 py-1.5 text-sm rounded-lg flex items-center gap-1.5"
                            :class="editor.showPreview ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span x-text="editor.showPreview ? '隐藏预览' : '显示预览'"></span>
                    </button>
                    <button @click="saveFile()" 
                            class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 flex items-center gap-2"
                            :disabled="editor.saving || !editor.isModified"
                            :class="{ 'opacity-50 cursor-not-allowed': editor.saving || !editor.isModified }">
                        <svg x-show="!editor.saving" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        <svg x-show="editor.saving" class="icon animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="10"/>
                        </svg>
                        <span x-text="editor.saving ? '保存中...' : '保存'"></span>
                    </button>
                    <button @click="closeEditor()" class="text-gray-400 hover:text-gray-600 p-1">
                        <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="flex flex-1 overflow-hidden" x-show="editor.language === 'markdown' && editor.showPreview">
                <!-- 左：编辑区 + 行号 -->
                <div class="flex flex-1 h-full">
                    <div id="lineNumbersSplit" class="bg-gray-800 text-gray-500 select-none" style="font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 13px; min-width: 40px; padding-right: 8px; text-align: right; overflow: hidden; white-space: pre-wrap; color: #6b7280;"></div>
                    <textarea id="codeEditorSplit"
                        class="flex-1 h-full resize-none p-4 bg-gray-900 text-gray-300 outline-none border-0"
                        style="font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 13px; line-height: 1.5; tab-size: 4; white-space: pre; overflow-x: auto;"
                        x-model="editor.content"
                        @input="editor.isModified = editor.content !== editor.originalContent; updateCursorInfo($event); updateLineNumbers()"
                        @click="updateCursorInfo($event); updateLineNumbers()"
                        @keyup="updateCursorInfo($event); updateLineNumbers()"
                        @scroll="syncEditorScroll(); updateLineNumbers()"
                        spellcheck="false"
                        x-ref="codeEditor"></textarea>
                </div>
                <!-- 右：Markdown 预览 -->
                <div id="markdownPreview" class="flex-1 overflow-auto p-4 bg-white border-l border-gray-700">
                    <div class="markdown-body prose max-w-none"
                         x-html="editor.content ? (typeof marked !== 'undefined' ? marked.parse(editor.content) : editor.content) : ''"></div>
                </div>
            </div>
            <!-- 无预览模式：纯编辑区 -->
            <div class="flex flex-1 h-full overflow-hidden" x-show="editor.language !== 'markdown' || !editor.showPreview">
                <div class="flex flex-1 h-full">
                    <div id="lineNumbers" class="bg-gray-800 text-gray-500 select-none" style="font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 13px; min-width: 40px; padding-right: 8px; text-align: right; overflow: hidden; white-space: pre-wrap; color: #6b7280;"></div>
                    <textarea id="codeEditor"
                        class="flex-1 h-full resize-none p-4 bg-gray-900 text-gray-300 outline-none border-0"
                        style="font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 13px; line-height: 1.5; tab-size: 4; white-space: pre; overflow-x: auto;"
                        x-model="editor.content"
                        @input="editor.isModified = editor.content !== editor.originalContent; updateCursorInfo($event); updateLineNumbers()"
                        @click="updateCursorInfo($event); updateLineNumbers()"
                        @keyup="updateCursorInfo($event); updateLineNumbers()"
                        @scroll="updateLineNumbers()"
                        spellcheck="false"
                        x-ref="codeEditor"></textarea>
                </div>
            </div>
            <div class="px-4 py-2 border-t border-gray-200 bg-gray-50 rounded-b-xl flex justify-between text-xs text-gray-500">
                <span x-text="`行 ${editor.cursorLine || 1}, 列 ${editor.cursorCol || 1}`"></span>
                <span x-text="`${editor.content?.length || 0} 字符`"></span>
            </div>
        </div>
    </div>

    <!-- ===== Toast 通知容器 ===== -->
    <div class="toast-container">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast" :class="toast.type">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" x-html="getToastIcon(toast.type)">
                </svg>
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>


    <!-- ===== JavaScript ===== -->
    <script>
        // 抑制 Alpine.js 的 isFromCancelledTransition 未捕获异常
        window.addEventListener('unhandledrejection', function(e) {
            if (e.reason && e.reason.isFromCancelledTransition) {
                e.preventDefault();
            }
        });

        // 抑制 CodeMirror 5 的 mapFromLineView 返回 undefined 导致的 TypeError
        // 这是一个已知的 CodeMirror 5 内部 bug，在不影响功能的情况下静默处理
        window.addEventListener('error', function(e) {
            if (e.message && e.message.includes("Cannot read properties of undefined (reading 'map')")) {
                e.preventDefault();
                e.stopPropagation();
                return true;
            }
        });

        function fileManager() {
            return {
                // ===== 状态 =====
                currentUser: null,
                isAdmin: false,
                currentPath: '',
                files: [],
                loading: false,
                viewMode: 'list',
                selectedFiles: [],
                dragOver: false,
                uploads: [],
                toasts: [],
                
                // 导航历史
                history: [],
                historyIndex: -1,
                
                // 搜索和排序
                searchQuery: '',
                sortBy: 'name',
                sortDesc: false,
                
                // 对话框状态
                showMkdirDialog: false,
                showNewFileDialog: false,
                showRenameDialog: false,
                showDeleteConfirm: false,
                newDirName: '',
                newFileName: '',
                renameTarget: { oldName: '', newName: '' },
                deleteTarget: { file: null, files: [], isBatch: false },
                
                // 上下文菜单
                contextMenu: { show: false, x: 0, y: 0, file: null },
                
                // 预览
                preview: { show: false, file: null, content: '', renderedContent: '', url: '', mediaType: null, loading: false, truncated: false },
                
                // 编辑器
                editor: {
                    show: false,
                    file: null,
                    content: '',
                    originalContent: '',
                    language: 'text',
                    isModified: false,
                    saving: false,
                    cursorLine: 1,
                    cursorCol: 1,
                    showPreview: false,
                    cmInstance: null  // legacy, no longer used
                },
                
                // 目录树（从后端API加载，参见 initSidebar）
                rootNodes: [],
                
                
                // ===== 初始化 =====
                async init() {
                    await this.checkAuth();
                    await this.initSidebar();
                    // 设置为第一个文件夹路径
                    if (this.rootNodes.length > 0) {
                        this.currentPath = this.rootNodes[0].path;
                    }
                    this.loadFiles();
                    this.expandRootNodes();
                },

                async checkAuth() {
                    const token = localStorage.getItem('session_token');
                    const currentPath = window.location.pathname;
                    if (!token) {
                        window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/session', {
                            headers: { 'X-Session-Token': token }
                        });
                        const data = await response.json();

                        if (data.code !== 0) {
                            localStorage.removeItem('session_token');
                            localStorage.removeItem('user');
                            window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                            return;
                        }

                        this.currentUser = data.data.username;
                        this.isAdmin = data.data.role === 'admin';
                    } catch (e) {
                        window.location.href = '/monitor/login.html?next=' + encodeURIComponent(currentPath);
                    }
                },

                getToken() {
                    return localStorage.getItem('session_token') || '';
                },

                async apiRequest(url, options = {}) {
                    const token = this.getToken();
                    const headers = { ...options.headers };
                    if (token) headers['X-Session-Token'] = token;
                    return fetch(url, { ...options, headers });
                },

                async logout() {
                    try {
                        await this.apiRequest('/api/auth/logout?action=logout', { method: 'POST' });
                    } finally {
                        localStorage.removeItem('session_token');
                        localStorage.removeItem('user');
                        window.location.href = '/monitor/login.html';
                    }
                },

                // 从后端加载侧边栏配置
                async initSidebar() {
                    try {
                        const response = await this.apiRequest('/files/?action=config');
                        const data = await response.json();
                        if (data.code === 0 && data.data.folders) {
                            this.rootNodes = data.data.folders.map(folder => ({
                                name: folder.name,
                                path: folder.path,
                                expanded: false,
                                hasChildren: true,
                                children: [],
                                loading: false
                            }));
                            // 默认展开第一个
                            if (this.rootNodes.length > 0) {
                                this.rootNodes[0].expanded = true;
                            }
                        }
                    } catch (e) {
                        console.error('Failed to load sidebar config:', e);
                    }
                },
                
                // ===== 计算属性 =====
                get breadcrumbs() {
                    const parts = this.currentPath.split('/').filter(p => p);
                    const crumbs = [];
                    let current = '';
                    for (const part of parts) {
                        current += '/' + part;
                        crumbs.push({ name: part, path: current });
                    }
                    return crumbs;
                },
                
                get isAllSelected() {
                    return this.files.length > 0 && this.selectedFiles.length === this.files.length;
                },
                
                get canGoBack() {
                    return this.historyIndex > 0;
                },
                
                get canGoForward() {
                    return this.historyIndex < this.history.length - 1;
                },
                
                get canGoUp() {
                    return !this.rootNodes.some(root => root.path === this.currentPath);
                },
                
                get filteredFiles() {
                    let result = [...(this.files || [])];
                    
                    // 搜索过滤
                    if (this.searchQuery) {
                        const query = this.searchQuery.toLowerCase();
                        result = result.filter(f => f.name.toLowerCase().includes(query));
                    }
                    
                    // 排序
                    result.sort((a, b) => {
                        if (a.type === 'directory' && b.type !== 'directory') return -1;
                        if (a.type !== 'directory' && b.type === 'directory') return 1;
                        
                        let comparison = 0;
                        switch (this.sortBy) {
                            case 'name':
                                comparison = a.name.localeCompare(b.name);
                                break;
                            case 'size':
                                comparison = (a.size || 0) - (b.size || 0);
                                break;
                            case 'mtime':
                                comparison = (a.mtime || 0) - (b.mtime || 0);
                                break;
                        }
                        return this.sortDesc ? -comparison : comparison;
                    });
                    
                    return result;
                },
                
                // ===== 文件加载 =====
                async loadFiles() {
                    this.loading = true;
                    try {
                        const response = await this.apiRequest(`/files/?action=list&path=${encodeURIComponent(this.currentPath)}`);
                        const data = await response.json();
                        if (data.code === 0) {
                            this.files = Array.isArray(data.data.items) ? data.data.items : (data.data.items ? [data.data.items] : []);
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('加载文件列表失败', 'error');
                    } finally {
                        this.loading = false;
                    }
                },
                
                // ===== 导航 =====
                navigateTo(index) {
                    if (index === -1) return;
                    const path = this.breadcrumbs[index].path;
                    this.navigateToPath(path);
                },
                
                navigateToPath(path) {
                    if (this.currentPath === path) return;
                    
                    // 添加到历史
                    if (this.historyIndex < this.history.length - 1) {
                        this.history = this.history.slice(0, this.historyIndex + 1);
                    }
                    this.history.push(path);
                    this.historyIndex++;
                    
                    this.currentPath = path;
                    this.selectedFiles = [];
                    this.loadFiles();
                    this.updateTreeSelection();
                },
                
                navigateBack() {
                    if (!this.canGoBack) return;
                    this.historyIndex--;
                    this.currentPath = this.history[this.historyIndex];
                    this.selectedFiles = [];
                    this.loadFiles();
                    this.updateTreeSelection();
                },
                
                navigateForward() {
                    if (!this.canGoForward) return;
                    this.historyIndex++;
                    this.currentPath = this.history[this.historyIndex];
                    this.selectedFiles = [];
                    this.loadFiles();
                    this.updateTreeSelection();
                },
                
                navigateUp() {
                    const parts = this.currentPath.split('/').filter(p => p);
                    if (parts.length <= 1) return;
                    parts.pop();
                    const parentPath = '/' + parts.join('/');
                    this.navigateToPath(parentPath);
                },
                
                // ===== 目录树操作 =====
                async expandRootNodes() {
                    for (const root of this.rootNodes) {
                        if (root.expanded) {
                            await this.loadTreeNode(root);
                        }
                    }
                },
                
                async loadTreeNode(node) {
                    node.loading = true;
                    try {
                        const response = await this.apiRequest(`/files/?action=list&path=${encodeURIComponent(node.path)}`);
                        const data = await response.json();
                        if (data.code === 0) {
                            node.children = data.data.items
                                .filter(item => item.type === 'directory')
                                .map(dir => ({
                                    name: dir.name,
                                    path: node.path + '/' + dir.name,
                                    expanded: false,
                                    hasChildren: true,
                                    children: [],
                                    loading: false,
                                    level: (node.level || 0) + 1,
                                    isDragOver: false
                                }));
                            node.hasChildren = node.children.length > 0;
                        }
                    } catch (e) {
                        console.error('加载目录失败:', e);
                    } finally {
                        node.loading = false;
                    }
                },
                
                async toggleTreeNode(node) {
                    if (!node.hasChildren) return;
                    
                    if (!node.expanded && node.children.length === 0) {
                        await this.loadTreeNode(node);
                    }
                    node.expanded = !node.expanded;
                },
                
                selectTreeNode(node) {
                    this.navigateToPath(node.path);
                },
                
                updateTreeSelection() {
                    // 高亮当前路径对应的树节点
                    for (const root of this.rootNodes) {
                        this.updateNodeActive(root);
                    }
                },
                
                updateNodeActive(node) {
                    node.active = node.path === this.currentPath;
                    if (node.children) {
                        for (const child of node.children) {
                            this.updateNodeActive(child);
                        }
                    }
                },
                
                expandAll() {
                    for (const root of this.rootNodes) {
                        root.expanded = true;
                        this.loadTreeNode(root);
                    }
                },
                
                collapseAll() {
                    for (const root of this.rootNodes) {
                        root.expanded = false;
                        root.children = [];
                    }
                },

                refreshCurrentTree() {
                    for (const root of this.rootNodes) {
                        if (this.currentPath.startsWith(root.path)) {
                            this.loadTreeNode(root);
                            break;
                        }
                    }
                },

                // ===== 选择和点击 =====
                handleRowClick(file, event) {
                    if (event.ctrlKey || event.metaKey) {
                        const idx = this.selectedFiles.indexOf(file.name);
                        if (idx > -1) {
                            this.selectedFiles = this.selectedFiles.filter(f => f !== file.name);
                        } else {
                            this.selectedFiles = [...this.selectedFiles, file.name];
                        }
                    } else if (event.shiftKey) {
                        this.handleRangeSelect(file);
                    } else {
                        this.selectedFiles = [file.name];
                    }
                },
                
                handleRangeSelect(file) {
                    if (this.selectedFiles.length === 0) {
                        this.selectedFiles = [file.name];
                        return;
                    }
                    
                    const files = this.filteredFiles;
                    const lastSelected = this.selectedFiles[this.selectedFiles.length - 1];
                    const lastIdx = files.findIndex(f => f.name === lastSelected);
                    const currentIdx = files.findIndex(f => f.name === file.name);
                    
                    if (lastIdx === -1 || currentIdx === -1) return;
                    
                    const start = Math.min(lastIdx, currentIdx);
                    const end = Math.max(lastIdx, currentIdx);
                    
                    const toAdd = [];
                    for (let i = start; i <= end; i++) {
                        if (!this.selectedFiles.includes(files[i].name)) {
                            toAdd.push(files[i].name);
                        }
                    }
                    if (toAdd.length > 0) {
                        this.selectedFiles = [...this.selectedFiles, ...toAdd];
                    }
                },
                
                toggleSelectAll(event) {
                    if (event.target.checked) {
                        this.selectedFiles = this.filteredFiles.map(f => f.name);
                    } else {
                        this.selectedFiles = [];
                    }
                },
                
                // ===== 双击和上下文菜单 =====
                handleDblClick(file) {
                    if (file.type === 'directory') {
                        const newPath = this.currentPath + '/' + file.name;
                        this.navigateToPath(newPath);
                    } else {
                        this.previewFile(file);
                    }
                },
                
                showContextMenu(event, file) {
                    this.contextMenu = {
                        show: true,
                        x: event.clientX,
                        y: event.clientY,
                        file: file
                    };
                },
                
                openDirectory(file) {
                    const newPath = this.currentPath + '/' + file.name;
                    this.navigateToPath(newPath);
                    this.contextMenu.show = false;
                },
                
                openRenameDialog() {
                    if (!this.contextMenu.file) return;
                    this.renameTarget = {
                        oldName: this.contextMenu.file.name,
                        newName: this.contextMenu.file.name
                    };
                    this.showRenameDialog = true;
                    this.contextMenu.show = false;
                    this.$nextTick(() => {
                        const input = this.$refs.renameInput;
                        if (input) {
                            input.focus();
                            input.select();
                        }
                    });
                },
                
                // ===== 图标系统 =====
                getFileIconClass(file) {
                    if (file.type === 'directory') return 'text-yellow-500';
                    const mediaType = this.getMediaType(file);
                    if (mediaType === 'image') return 'text-purple-500';
                    if (mediaType === 'audio') return 'text-pink-500';
                    if (mediaType === 'video') return 'text-red-500';
                    return 'text-gray-400';
                },
                
                getFileIconPath(file) {
                    if (file.type === 'directory') {
                        return 'M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z';
                    }
                    const ext = file.name.split('.').pop().toLowerCase();
                    const iconMap = {
                        txt: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8',
                        pdf: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M9 15h6',
                        zip: 'M21 8v13H3V8M1 3h22v5H1zM10 12h4',
                        jpg: 'M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z M8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z',
                        jpeg: 'M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z M8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z',
                        png: 'M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z M8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z',
                        mp3: 'M9 18V5l12-2v13 M6 18a3 3 0 1 0 6 0 3 3 0 0 0-6 0 M18 16a3 3 0 1 0 6 0 3 3 0 0 0-6 0',
                        mp4: 'M23 7l-7 5 7 5V7z M2 5h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z'
                    };
                    return iconMap[ext] || 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8';
                },
                
                // ===== 格式化 =====
                formatDate(timestamp) {
                    if (!timestamp || timestamp < 946656000) return '-';
                    const date = new Date(timestamp * 1000);
                    return date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                },
                
                getStatusText() {
                    const total = this.files.length;
                    const folders = this.files.filter(f => f.type === 'directory').length;
                    const files = total - folders;
                    return `${total} 个项目 (${folders} 个文件夹, ${files} 个文件)`;
                },
                
                // ===== 编辑器功能 =====
                isEditableFile(file) {
                    if (file.type === 'directory') return false;
                    const editableExts = ['txt', 'log', 'csv', 'json', 'xml', 'yaml', 'yml', 'lua', 'py', 'js', 'sh', 'conf', 'cfg', 'ini', 'md', 'html', 'htm', 'css', 'sql', 'c', 'h', 'cpp', 'hpp'];
                    const ext = file.name.split('.').pop().toLowerCase();
                    return editableExts.includes(ext);
                },
                
                canPreviewFile(file) {
                    if (file.type === 'directory') return false;
                    return this.isEditableFile(file) || this.getMediaType(file);
                },
                
                getMediaType(file) {
                    if (!file || file.type === 'directory') return null;
                    const ext = file.name.split('.').pop().toLowerCase();
                    const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg'];
                    const audioExts = ['mp3', 'wav', 'ogg', 'aac', 'flac', 'm4a'];
                    const videoExts = ['mp4', 'avi', 'mkv', 'mov', 'wmv', 'webm'];
                    const markdownExts = ['md', 'markdown', 'mdown'];

                    if (imageExts.includes(ext)) return 'image';
                    if (audioExts.includes(ext)) return 'audio';
                    if (videoExts.includes(ext)) return 'video';
                    if (markdownExts.includes(ext)) return 'markdown';
                    return null;
                },
                
                getLanguageMode(file) {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const modeMap = { js: 'javascript', lua: 'lua', py: 'python', sh: 'shell', html: 'htmlmixed', htm: 'htmlmixed', xml: 'xml', css: 'css', yaml: 'yaml', yml: 'yaml', sql: 'sql', md: 'markdown', json: 'javascript' };
                    return modeMap[ext] || 'text';
                },
                
                getLanguageLabel(mode) {
                    const labels = { javascript: 'JavaScript', lua: 'Lua', python: 'Python', shell: 'Shell', htmlmixed: 'HTML', xml: 'XML', css: 'CSS', yaml: 'YAML', sql: 'SQL', markdown: 'Markdown', text: '纯文本' };
                    return labels[mode] || mode;
                },
                
                getFullPath(fileName) {
                    return this.currentPath + '/' + fileName;
                },
                
                async editFile(file) {
                    this.editor.file = file;
                    this.editor.show = true;
                    this.editor.saving = false;
                    this.editor.isModified = false;
                    this.editor.language = this.getLanguageMode(file);
                    this.editor.showPreview = this.editor.language === 'markdown';

                    try {
                        const fullPath = this.getFullPath(file.name);
                        const response = await this.apiRequest(`/files/?action=preview&path=${encodeURIComponent(fullPath)}`);
                        const data = await response.json();

                        if (data.code === 0) {
                            this.editor.content = data.data.content || '';
                            this.editor.originalContent = data.data.content || '';
                            this.$nextTick(() => {
                                const isSplit = this.editor.language === 'markdown' && this.editor.showPreview;
                                const ta = document.getElementById(isSplit ? 'codeEditorSplit' : 'codeEditor');
                                if (ta) {
                                    ta.value = this.editor.content;
                                    ta.scrollTop = 0;
                                    ta.focus();
                                    this.editor.cursorLine = 1;
                                    this.editor.cursorCol = 1;
                                }
                                // Delay to ensure DOM is fully rendered
                                setTimeout(() => this.updateLineNumbers(), 50);
                            });
                        } else {
                            this.showToast('无法读取文件: ' + data.message, 'error');
                            this.closeEditor();
                        }
                    } catch (e) {
                        this.showToast('读取文件失败', 'error');
                        this.closeEditor();
                    }
                },

                updateCursorInfo(event) {
                    const ta = event.target;
                    const pos = ta.selectionStart;
                    const text = ta.value.substring(0, pos);
                    const lines = text.split('\n');
                    this.editor.cursorLine = lines.length;
                    this.editor.cursorCol = lines[lines.length - 1].length + 1;
                },

                syncEditorScroll() {
                    const ta = document.getElementById('codeEditorSplit');
                    const preview = document.getElementById('markdownPreview');
                    if (!ta) return;
                    const scrollRatio = ta.scrollTop / (ta.scrollHeight - ta.clientHeight || 1);
                    if (preview) preview.scrollTop = scrollRatio * (preview.scrollHeight - preview.clientHeight);
                },

                updateLineNumbers() {
                    const content = this.editor.content || '';
                    const lines = content.split('\n');
                    const lineCount = lines.length;
                    const isSplit = this.editor.language === 'markdown' && this.editor.showPreview;
                    const ln = document.getElementById(isSplit ? 'lineNumbersSplit' : 'lineNumbers');
                    const ta = document.getElementById(isSplit ? 'codeEditorSplit' : 'codeEditor');
                    if (!ln || !ta) return;
                    const lh = 19.5;
                    const paddingTop = parseFloat(window.getComputedStyle(ta).paddingTop) || 16;
                    // Render ALL line numbers
                    const curLine = this.editor.cursorLine || 1;
                    let html = '';
                    for (let i = 1; i <= lineCount; i++) {
                        const isCur = i === curLine;
                        const border = isCur ? 'border-left:3px solid #60a5fa;padding-left:5px;' : 'border-left:3px solid transparent;padding-left:5px;';
                        const color = isCur ? 'color:#e2e8f0;font-weight:600;' : '';
                        html += '<div style="height:' + lh + 'px;line-height:' + lh + 'px;' + border + color + '">' + i + '</div>';
                    }
                    ln.innerHTML = html;
                    // Align with textarea: same padding, same scroll offset
                    ln.style.paddingTop = paddingTop + 'px';
                    ln.style.marginTop = '-' + ta.scrollTop + 'px';
                },

                async saveFile() {
                    if (!this.editor.isModified || this.editor.saving) return;

                    // Sync content from textarea
                    const ta = this.$refs.codeEditor;
                    if (ta) this.editor.content = ta.value;

                    this.editor.saving = true;
                    try {
                        const filePath = this.getFullPath(this.editor.file.name);
                        const response = await this.apiRequest('/files/', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                action: 'save',
                                path: filePath,
                                content: this.editor.content
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.code === 0) {
                            this.editor.originalContent = this.editor.content;
                            this.editor.isModified = false;
                            this.showToast('保存成功', 'success');
                            this.loadFiles();
                        } else {
                            this.showToast('保存失败: ' + data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('保存失败', 'error');
                    } finally {
                        this.editor.saving = false;
                    }
                },
                
                closeEditor() {
                    if (this.editor.isModified) {
                        if (!confirm('文件已修改，是否放弃保存？')) return;
                    }

                    this.editor.show = false;
                    this.editor.file = null;
                    this.editor.content = '';
                    this.editor.originalContent = '';
                    this.editor.isModified = false;
                },
                
                // ===== 文件操作 =====
                async downloadFile(file) {
                    const fullPath = this.getFullPath(file.name);
                    if (file.type === 'directory') {
                        this.showToast('正在打包目录...', 'info');
                        try {
                            const response = await fetch(
                                `/files/?action=pack&path=${encodeURIComponent(fullPath)}`,
                                { method: 'POST' }
                            );
                            const data = await response.json();
                            if (data.code === 0) {
                                const link = document.createElement('a');
                                link.href = `/files/?action=download&path=${encodeURIComponent(data.data.archive)}`;
                                link.download = data.data.name;
                                link.click();
                                this.showToast(`开始下载 "${data.data.name}" (${data.data.size_formatted})`, 'success');
                            } else {
                                this.showToast(data.message || '打包失败', 'error');
                            }
                        } catch (e) {
                            this.showToast('打包目录失败', 'error');
                        }
                    } else {
                        const link = document.createElement('a');
                        link.href = `/files/?action=download&path=${encodeURIComponent(fullPath)}`;
                        link.download = file.name;
                        link.click();
                        this.showToast(`开始下载 "${file.name}"`, 'info');
                    }
                },
                
                // ===== 删除操作 =====
                getDeleteMessage() {
                    if (this.deleteTarget.isBatch) {
                        return `确定要删除选中的 ${this.deleteTarget.files.length} 个项目吗？`;
                    }
                    return `确定要删除 "${this.deleteTarget.file?.name}" 吗？`;
                },
                
                confirmDelete(file) {
                    this.deleteTarget = { file, files: [], isBatch: false };
                    this.showDeleteConfirm = true;
                },
                
                async executeDelete() {
                    this.showDeleteConfirm = false;
                    
                    if (this.deleteTarget.isBatch) {
                        let successCount = 0;
                        for (const name of this.deleteTarget.files) {
                            const file = this.files.find(f => f.name === name);
                            if (file) {
                                try {
                                    const fullPath = this.getFullPath(file.name);
                                    const response = await fetch(
                                        `/files/?path=${encodeURIComponent(fullPath)}&recursive=${file.type === 'directory'}`,
                                        { method: 'DELETE' }
                                    );
                                    const data = await response.json();
                                    if (data.code === 0) successCount++;
                                } catch (e) {}
                            }
                        }
                        this.selectedFiles = [];
                        this.loadFiles();
                        this.refreshCurrentTree();
                        this.showToast(`已删除 ${successCount} 个项目`, successCount > 0 ? 'success' : 'error');
                    } else {
                        const file = this.deleteTarget.file;
                        try {
                            const fullPath = this.getFullPath(file.name);
                            const response = await fetch(
                                `/files/?path=${encodeURIComponent(fullPath)}&recursive=${file.type === 'directory'}`,
                                { method: 'DELETE' }
                            );
                            const data = await response.json();

                            if (data.code === 0) {
                                this.showToast('删除成功', 'success');
                                this.loadFiles();
                                this.refreshCurrentTree();
                            } else {
                                this.showToast(data.message, 'error');
                            }
                        } catch (e) {
                            this.showToast('删除失败', 'error');
                        }
                    }
                },
                
                // ===== 批量操作 =====
                batchDelete() {
                    if (this.selectedFiles.length === 0) return;
                    this.deleteTarget = { file: null, files: [...this.selectedFiles], isBatch: true };
                    this.showDeleteConfirm = true;
                },

                async batchDownload() {
                    if (this.selectedFiles.length === 0) return;
                    this.showToast('正在打包下载...', 'info');
                    try {
                        const items = this.selectedFiles.map(name => {
                            const file = this.files.find(f => f.name === name);
                            return file ? this.getFullPath(file.name) : null;
                        }).filter(Boolean);
                        const response = await this.apiRequest('/files/', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'pack_batch', items: items })
                        });
                        const data = await response.json();
                        if (data.code === 0) {
                            const link = document.createElement('a');
                            link.href = `/files/?action=download&path=${encodeURIComponent(data.data.archive)}`;
                            link.download = data.data.name;
                            link.click();
                            this.showToast(`已下载 ${data.data.name}`, 'success');
                        } else {
                            this.showToast(data.message || '打包失败', 'error');
                        }
                    } catch (e) {
                        this.showToast('打包下载失败', 'error');
                    }
                },

                // ===== 创建目录 =====
                async createDirectory() {
                    if (!this.newDirName.trim()) return;
                    
                    try {
                        const fullPath = this.getFullPath(this.newDirName);
                        const response = await fetch(
                            `/files/?path=${encodeURIComponent(fullPath)}&action=mkdir`,
                            { method: 'POST' }
                        );
                        const data = await response.json();
                        
                        if (data.code === 0) {
                            this.showToast('目录创建成功', 'success');
                            this.showMkdirDialog = false;
                            this.newDirName = '';
                            this.loadFiles();
                            // 刷新树
                            for (const root of this.rootNodes) {
                                if (this.currentPath.startsWith(root.path)) {
                                    root.expanded = true;
                                    await this.loadTreeNode(root);
                                }
                            }
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('创建目录失败', 'error');
                    }
                },

                // ===== 新建文件 =====
                async createNewFile() {
                    if (!this.newFileName.trim()) return;
                    const fileName = this.newFileName.trim();
                    const fullPath = this.getFullPath(fileName);

                    // 检查文件是否已存在
                    const existing = this.files.find(f => f.name === fileName);
                    if (existing) {
                        this.showToast('文件已存在', 'error');
                        return;
                    }

                    try {
                        // 创建空文件
                        const response = await this.apiRequest('/files/', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'save', path: fullPath, content: '' })
                        });
                        const data = await response.json();

                        if (data.code === 0) {
                            this.showNewFileDialog = false;
                            this.newFileName = '';
                            this.showToast('文件已创建', 'success');
                            // 刷新文件列表
                            await this.loadFiles();
                            // 刷新树
                            for (const root of this.rootNodes) {
                                if (this.currentPath.startsWith(root.path)) {
                                    root.expanded = true;
                                    await this.loadTreeNode(root);
                                }
                            }
                            // 直接打开编辑器
                            const file = this.files.find(f => f.name === fileName);
                            if (file) {
                                this.editFile(file);
                            }
                        } else {
                            this.showToast(data.message || '创建文件失败', 'error');
                        }
                    } catch (e) {
                        this.showToast('创建文件失败', 'error');
                    }
                },

                // ===== 重命名 =====
                async renameFile() {
                    if (!this.renameTarget.newName.trim() || !this.contextMenu.file) return;
                    
                    try {
                        const srcPath = this.getFullPath(this.contextMenu.file.name);
                        const dstPath = this.getFullPath(this.renameTarget.newName);
                        const response = await this.apiRequest('/files/', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'rename', src: srcPath, dst: dstPath })
                        });
                        const data = await response.json();
                        
                        if (data.code === 0) {
                            this.showToast('重命名成功', 'success');
                            this.showRenameDialog = false;
                            this.loadFiles();
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('重命名失败', 'error');
                    }
                },
                
                // ===== 预览 =====
                async previewFile(file) {
                    this.preview.file = file;
                    this.preview.show = true;
                    this.preview.loading = true;
                    this.preview.mediaType = this.getMediaType(file);
                    this.preview.url = `/files/?action=download&path=${encodeURIComponent(this.getFullPath(file.name))}`;
                    this.preview.renderedContent = '';

                    if (this.preview.mediaType && this.preview.mediaType !== 'markdown') {
                        this.preview.loading = false;
                        return;
                    }

                    try {
                        const fullPath = this.getFullPath(file.name);
                        const response = await this.apiRequest(`/files/?action=preview&path=${encodeURIComponent(fullPath)}`);
                        const data = await response.json();

                        if (data.code === 0) {
                            this.preview.content = data.data.content;
                            this.preview.truncated = data.data.truncated;
                            // Render markdown
                            if (this.preview.mediaType === 'markdown' && typeof marked !== 'undefined') {
                                this.preview.renderedContent = marked.parse(data.data.content || '');
                            }
                        } else {
                            this.showToast(data.message, 'error');
                            this.closePreview();
                        }
                    } catch (e) {
                        this.showToast('预览加载失败', 'error');
                        this.closePreview();
                    } finally {
                        this.preview.loading = false;
                    }
                },
                
                closePreview() {
                    this.preview.show = false;
                    this.preview.file = null;
                    this.preview.content = '';
                    this.preview.url = '';
                    this.preview.mediaType = null;
                },
                
                
                // ===== 拖拽操作 =====
                handleDragStart(event, file) {
                    event.dataTransfer.setData('text/plain', file.name);
                    event.dataTransfer.effectAllowed = 'move';
                },
                
                handleDragEnd(event) {
                    // 清理
                },
                
                handleTreeDragOver(event, node) {
                    event.preventDefault();
                    node.isDragOver = true;
                },
                
                handleTreeDragLeave(event) {
                    // 清理拖拽状态
                    for (const root of this.rootNodes) {
                        this.clearDragOver(root);
                    }
                },
                
                clearDragOver(node) {
                    node.isDragOver = false;
                    if (node.children) {
                        for (const child of node.children) {
                            this.clearDragOver(child);
                        }
                    }
                },
                
                async handleTreeDrop(event, targetNode) {
                    event.preventDefault();
                    if (targetNode) targetNode.isDragOver = false;
                    
                    const fileName = event.dataTransfer.getData('text/plain');
                    if (!fileName || !targetNode) return;
                    
                    const targetPath = targetNode.path + '/' + fileName;
                    const sourcePath = this.getFullPath(fileName);
                    
                    if (sourcePath === targetPath) return;
                    
                    try {
                        const response = await this.apiRequest('/files/', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'move', src: sourcePath, dst: targetPath })
                        });
                        const data = await response.json();
                        
                        if (data.code === 0) {
                            this.showToast('移动成功', 'success');
                            this.loadFiles();
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('移动失败', 'error');
                    }
                },
                
                // ===== 键盘事件 =====
                handleMkdirKeydown(event) {
                    if (event.key === 'Enter') this.createDirectory();
                    else if (event.key === 'Escape') this.showMkdirDialog = false;
                },
                
                handleRenameKeydown(event) {
                    if (event.key === 'Enter') this.renameFile();
                    else if (event.key === 'Escape') this.showRenameDialog = false;
                },
                
                handleGlobalKeydown(event) {
                    if (event.key === 'F5') {
                        event.preventDefault();
                        this.loadFiles();
                    } else if (event.key === 'Delete' && this.selectedFiles.length > 0) {
                        event.preventDefault();
                        this.deleteTarget = { file: null, files: this.selectedFiles, isBatch: true };
                        this.showDeleteConfirm = true;
                    } else if ((event.ctrlKey || event.metaKey) && event.key === 'a') {
                        event.preventDefault();
                        this.selectedFiles = this.filteredFiles.map(f => f.name);
                    } else if ((event.ctrlKey || event.metaKey) && event.key === 'f') {
                        event.preventDefault();
                        document.querySelector('input[type="search"]')?.focus();
                    } else if (event.key === 'Escape') {
                        this.showMkdirDialog = false;
                        this.showRenameDialog = false;
                        this.showDeleteConfirm = false;
                        this.preview.show = false;
                        this.selectedFiles = [];
                    }
                },
                
                // ===== 上传 =====
                triggerFileUpload() {
                    document.getElementById('fileInput')?.click();
                },
                
                handleFileSelect(event) {
                    const files = event.target.files;
                    if (files.length > 0) {
                        this.uploadFiles(files);
                    }
                    event.target.value = '';
                },
                
                handleDrop(event) {
                    this.dragOver = false;
                    const files = event.dataTransfer.files;
                    if (files.length > 0) {
                        this.uploadFiles(files);
                    }
                },
                
                async uploadFiles(files) {
                    for (const file of files) {
                        const uploadId = Date.now() + Math.random();
                        const uploadItem = { id: uploadId, name: file.name, progress: 0, status: 'uploading' };
                        this.uploads.push(uploadItem);
                        
                        const formData = new FormData();
                        formData.append('file', file);
                        
                        const xhr = new XMLHttpRequest();
                        
                        xhr.upload.addEventListener('progress', (e) => {
                            if (e.lengthComputable) {
                                uploadItem.progress = Math.round((e.loaded / e.total) * 100);
                            }
                        });
                        
                        xhr.addEventListener('load', () => {
                            if (xhr.status === 200) {
                                const data = JSON.parse(xhr.responseText);
                                if (data.code === 0) {
                                    uploadItem.status = 'completed';
                                    this.showToast(`"${file.name}" 上传成功`, 'success');
                                    this.loadFiles();
                                } else {
                                    uploadItem.status = 'error';
                                    this.showToast(data.message, 'error');
                                }
                            }
                            setTimeout(() => this.removeUpload(uploadId), 3000);
                        });
                        
                        xhr.open('POST', `/files/?path=${encodeURIComponent(this.currentPath)}&action=upload&filename=${encodeURIComponent(file.name)}`);
                        xhr.send(formData);
                    }
                },
                
                removeUpload(id) {
                    const idx = this.uploads.findIndex(u => u.id === id);
                    if (idx > -1) this.uploads.splice(idx, 1);
                },
                
                // ===== 搜索和排序 =====
                handleSearch() {
                    this.selectedFiles = [];
                },
                
                setSort(field) {
                    if (this.sortBy === field) {
                        this.sortDesc = !this.sortDesc;
                    } else {
                        this.sortBy = field;
                        this.sortDesc = false;
                    }
                },
                
                // ===== Toast =====
                showToast(message, type = 'info') {
                    const id = Date.now();
                    this.toasts.push({ id, message, type });
                    setTimeout(() => {
                        const idx = this.toasts.findIndex(t => t.id === id);
                        if (idx > -1) this.toasts.splice(idx, 1);
                    }, 3000);
                },
                
                getToastIcon(type) {
                    const icons = {
                        success: '<path d="M5 13l4 4L19 7"/>',
                        error: '<circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>',
                        info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>',
                        warning: '<path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>'
                    };
                    return icons[type] || icons.info;
                }
            }
        }

    // 拦截下载链接点击，通知 Tauri
    document.addEventListener('click', async (e) => {
        const a = e.target.closest('a[href*="action=download"]');
        if (!a) return;

        e.preventDefault();

        // 从 URL 中解析出文件路径
        const url = new URL(a.href);
        const filePath = url.searchParams.get('path');
        const fileName = filePath.split('/').pop();

        // 通知 Tauri
        window.parent.postMessage({
        type: 'file-download',
        path: filePath,
        name: fileName
        }, '*');
    });    
    </script>
</body>
