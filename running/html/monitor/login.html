<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 文件管理器</title>
    <script src="/static/alpine.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container" x-data="loginApp()">
        <h1 class="login-title">文件管理器</h1>

        <div class="error-message" x-show="error" x-text="error"></div>

        <form @submit.prevent="login">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" x-model="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" x-model="password" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="submit-btn" :disabled="loading">
                <span x-show="!loading">登录</span>
                <span x-show="loading"><span class="loading"></span> 登录中...</span>
            </button>
        </form>
    </div>

    <script>
        function sanitizeRedirect(next) {
            if (!next || !next.startsWith('/') || next.startsWith('//') || /:/.test(next)) {
                return '/monitor/files.html';
            }
            return next;
        }

        function loginApp() {
            return {
                username: '',
                password: '',
                error: '',
                loading: false,

                init() {
                    // 已登录用户直接跳转
                    const token = localStorage.getItem('session_token');
                    if (token) {
                        const next = sanitizeRedirect(new URLSearchParams(window.location.search).get('next'));
                        window.location.href = next;
                    }
                },

                async login() {
                    if (!this.username || !this.password) {
                        this.error = '请输入用户名和密码';
                        return;
                    }

                    this.loading = true;
                    this.error = '';

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.username,
                                password: this.password
                            })
                        });

                        const data = await response.json();

                        if (data.code === 0) {
                            // 保存 session token
                            localStorage.setItem('session_token', data.data.session_token);
                            localStorage.setItem('user', JSON.stringify(data.data.user));
                            // 跳转到之前访问的页面或文件管理器
                            const next = sanitizeRedirect(new URLSearchParams(window.location.search).get('next'));
                            window.location.href = next;
                        } else {
                            this.error = data.message || '登录失败';
                        }
                    } catch (e) {
                        this.error = '网络错误，请稍后重试';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
