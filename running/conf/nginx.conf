
user  nobody;
worker_processes  5;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
error_log  logs/error.log  warn;

pid        logs/nginx.pid;

#env PATH=/usrdata/app/bin:/bin:/sbin:/usr/bin:/usr/sbin:/local/bin/:/local/usr/bin/:/local/usr/sbin:/usrdata/bin;
#env LD_LIBRARY_PATH=/usrdata/app/lib:/usrdata/lib;

# 侧边栏文件夹配置 (格式: "名称:路径,名称:路径,...")
env SIDEBAR_FOLDERS=Documents:/home/user/docs,USB-Drive:/mnt/usbdisk,Temp:/tmp;

# 管理员初始密码（不设置则自动生成随机密码并输出到日志）
env ADMIN_PASSWORD=change-me;

events {
    worker_connections  256;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
    include httpserver.conf;
    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;
    lua_code_cache  on;
    lua_shared_dict sidebar_config 64k;
    lua_shared_dict user_sessions 2m;

    # 初始化侧边栏文件夹配置（从环境变量 SIDEBAR_FOLDERS 读取）
    init_by_lua_file conf/sidebar_init.lua;

    # Timer 配置 - 增加定时器数量限制，避免阻塞
    lua_max_pending_timers 1024;
    lua_max_running_timers 512;
    
    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;
    gzip  on;

    server {
        include site.conf;
        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

    }

}
